name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ] # Ganti 'main' jika nama branch utama GitHub kamu berbeda

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        lfs: true

    - name: Push Folder SmartfastApi to HF (Tanpa Hapus Model)
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # 1. Clone repository Hugging Face yang ada saat ini ke folder sementara
        git clone https://GALIHPP123:$HF_TOKEN@huggingface.co/spaces/GALIHPP123/SmartInvestAPI hf_space
        
        # 2. Ambil isi folder SmartfastApi dari GitHub, copy ke folder clone tadi
        # Menggunakan rsync untuk copy semua file KECUALI folder models
        mkdir -p hf_space/models
        rsync -av --exclude='models/' SmartfastApi/ hf_space/
        
        # 3. Masuk ke folder Hugging Face, commit, dan push
        cd hf_space
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        
        git add .
        # Cek apakah ada perubahan kode, jika ada baru commit
        git diff-index --quiet HEAD || git commit -m "Deploy backend logic from GitHub Actions"
        
        git push origin main
