name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ] # Ganti 'main' jika nama branch utama GitHub kamu berbeda

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        lfs: true

    - name: Push Folder SmartfastApi & Assets to HF (Tanpa Hapus Model)
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # 1. Clone repository Hugging Face yang ada saat ini ke folder sementara
        git clone https://GALIHPP123:$HF_TOKEN@huggingface.co/spaces/GALIHPP123/SmartInvestAPI hf_space
        
        # 2. Pastikan folder models aman di dalam folder clone
        mkdir -p hf_space/models
        
        # 3. Sinkronisasi codingan utama dari folder SmartfastApi ke hf_space
        # Kita kecualikan folder 'models' dan 'assets' dari proses rsync utama ini
        rsync -av --exclude='models/' --exclude='assets/' SmartfastApi/ hf_space/
        
        # 4. Amankan folder assets secara utuh sebagai FOLDER, bukan cuma isinya
        if [ -d "SmartfastApi/assets" ]; then
          mkdir -p hf_space/assets
          rsync -av SmartfastApi/assets/ hf_space/assets/
        fi
        
        # 5. Masuk ke folder Hugging Face, commit, dan push
        cd hf_space
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        
        git add .
        # Cek apakah ada perubahan kode atau aset, jika ada baru commit
        git diff-index --quiet HEAD || git commit -m "Deploy backend logic and assets from GitHub Actions"
        
        git push origin main
